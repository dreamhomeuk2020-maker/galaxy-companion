<!DOCTYPE html>
<html>
<head>
  <title>Galaxy Harvester Game Helper</title>
  <style>
    body {
      background: #0b0f1a;
      color: #e6edf3;
      font-family: Arial;
      padding: 20px;
    }

    .card {
      background: #161b22;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
    }

    .missing {
      color: #ff6b6b;
    }
  </style>
</head>
<body>

<h1>🚀 Resource Hunter</h1>
<div id="app"></div>

<script>
async function loadData() {
  const res = await fetch("http://localhost:3000/api/missing");
  const data = await res.json();

  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    const title = document.createElement("h3");
    title.textContent = item.schematic;

    div.appendChild(title);

    item.missing.forEach(r => {
      const p = document.createElement("p");
      p.className = "missing";
      p.textContent = "❌ " + r;
      div.appendChild(p);
    });

    app.appendChild(div);
  });
}

loadData();
</script>

</body>
</html>
